apiVersion: osc.io/v1beta1
kind: CustomServiceDefinition
metadata:
  name: awx-csd
spec:
  CRDRef:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: helmreleases.osc.huaweicloud.com
  serviceEntityDependencies: []
  defaultConfiguration: |-
    {
      "apiVersion": "osc.huaweicloud.com/v1",
      "kind": "HelmRelease",
      "metadata": {
        "name": "awx"
      },
      "spec": {
        "chartName": "awx",
        "chartVersion": "1.0.0",
        "values": {
          "global": {
            "imageRegistry": "swr.cn-east-2.myhuaweicloud.com/dx_x2era"
          },
          "swr": {
            "username": "",
            "password": ""
          },
          "admin": {
            "password": ""
          },
          "service": {
            "type": "LoadBalancer"
          },
          "storage": {
            "postgres": {
              "size": "10Gi",
              "storageClass": "csi-disk"
            },
            "projects": {
              "enabled": true,
              "existingClaim": "awx-projects-claim"
            }
          }
        }
      }
    }
