apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: helmreleases.osc.huaweicloud.com
spec:
  group: osc.huaweicloud.com
  names:
    kind: HelmRelease
    listKind: HelmReleaseList
    plural: helmreleases
    singular: helmrelease
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                chartName:
                  type: string
                  title: Chart Name
                  description: Helm chart name
                chartVersion:
                  type: string
                  title: Chart Version
                  description: Helm chart version
                values:
                  type: object
                  title: 部署参数
                  description: AWX 部署配置参数
                  properties:
                    global:
                      type: object
                      title: 全局配置
                      properties:
                        imageRegistry:
                          type: string
                          title: SWR 镜像仓库地址
                          description: 华为云 SWR 镜像仓库地址
                          default: swr.cn-east-2.myhuaweicloud.com/dx_x2era
                        namespace:
                          type: string
                          title: 部署命名空间
                          description: Kubernetes 命名空间
                          default: cloud
                    images:
                      type: object
                      title: 镜像配置
                      properties:
                        awx:
                          type: string
                          title: AWX 镜像
                          description: awx 主应用镜像标签
                          default: awx:24.6.1
                        awxOperator:
                          type: string
                          title: Operator 镜像
                          description: awx-operator 镜像标签
                          default: awx-operator:2.19.1
                        awxEE:
                          type: string
                          title: EE 镜像
                          description: awx-ee 执行环境镜像标签
                          default: awx-ee:24.6.1
                        redis:
                          type: string
                          title: Redis 镜像
                          description: Redis 镜像标签
                          default: redis:7
                        postgresql:
                          type: string
                          title: PG 镜像
                          description: PostgreSQL 镜像标签
                          default: postgresql-15:latest
                        pullPolicy:
                          type: string
                          title: 拉取策略
                          description: Always / IfNotPresent / Never
                          default: IfNotPresent
                    swr:
                      type: object
                      title: SWR 凭证
                      properties:
                        username:
                          type: string
                          title: 用户名
                          description: 华为云 SWR 登录用户名
                          default: ""
                        password:
                          type: string
                          title: 密码
                          description: 华为云 SWR 登录密码或临时 token
                          default: ""
                    admin:
                      type: object
                      title: 管理员
                      properties:
                        user:
                          type: string
                          title: 用户名
                          default: admin
                        password:
                          type: string
                          title: 密码
                          description: AWX 管理员登录密码
                          default: ""
                        email:
                          type: string
                          title: 邮箱
                          default: admin@example.com
                    service:
                      type: object
                      title: 服务
                      properties:
                        type:
                          type: string
                          title: 暴露类型
                          description: LoadBalancer / NodePort / ClusterIP
                          default: LoadBalancer
                        port:
                          type: integer
                          title: 端口
                          default: 80
                    storage:
                      type: object
                      title: 存储
                      properties:
                        postgres:
                          type: object
                          title: PostgreSQL
                          properties:
                            size:
                              type: string
                              title: 大小
                              default: 10Gi
                            storageClass:
                              type: string
                              title: 存储类
                              default: csi-disk
                        projects:
                          type: object
                          title: Projects
                          properties:
                            enabled:
                              type: boolean
                              title: 启用
                              default: true
                            existingClaim:
                              type: string
                              title: 已有 PVC
                              default: awx-projects-claim
                            storageClass:
                              type: string
                              title: 存储类
                              default: csi-sfsturbo
                            size:
                              type: string
                              title: 大小
                              default: 100Gi
                            accessMode:
                              type: string
                              title: 访问模式
                              default: ReadWriteMany
                    resources:
                      type: object
                      title: 资源
                      properties:
                        web:
                          type: object
                          title: Web
                          properties:
                            requests:
                              type: object
                              title: 请求
                              properties:
                                cpu:
                                  type: string
                                  title: CPU
                                  default: 500m
                                memory:
                                  type: string
                                  title: 内存
                                  default: 2Gi
                        task:
                          type: object
                          title: Task
                          properties:
                            requests:
                              type: object
                              title: 请求
                              properties:
                                cpu:
                                  type: string
                                  title: CPU
                                  default: 500m
                                memory:
                                  type: string
                                  title: 内存
                                  default: 2Gi
                        postgres:
                          type: object
                          title: PostgreSQL
                          properties:
                            requests:
                              type: object
                              title: 请求
                              properties:
                                cpu:
                                  type: string
                                  title: CPU
                                  default: 100m
                                memory:
                                  type: string
                                  title: 内存
                                  default: 256Mi
                    replicas:
                      type: object
                      title: 副本
                      properties:
                        web:
                          type: integer
                          title: Web
                          default: 1
                        task:
                          type: integer
                          title: Task
                          default: 1
                    createPreloadData:
                      type: boolean
                      title: 预加载数据
                      default: true
