apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: helmreleases.osc.huaweicloud.com
spec:
  group: osc.huaweicloud.com
  names:
    kind: HelmRelease
    listKind: HelmReleaseList
    plural: helmreleases
    singular: helmrelease
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                chartName:
                  type: string
                  title: Chart Name
                chartVersion:
                  type: string
                  title: Chart Version
                values:
                  type: object
                  title: 部署参数
                  x-kubernetes-preserve-unknown-fields: true
